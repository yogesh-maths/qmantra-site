<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PDF Resources | Qmantra</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../style.css">
  <script>
  const isGitHub = location.hostname.includes('github.io');
  window.BASE = isGitHub ? '/qmantra-site' : '';
</script>
</head>

<body>



<header class="site-header">
  <h1>📚 PDF Practice Section</h1>
  <p>View questions & solutions</p>
</header>

  <nav>
 <a id="homeLink" href="#">Home</a>
</nav>

  <script>
document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("homeLink").href = window.BASE + "/";
});
</script>
  <!-- 🔎 SEARCH -->
<div style="width:400px;margin:30px auto;">
  <input 
    type="text" 
    id="searchInput" 
    placeholder="Search PDF (Algebra, Circle, AMC)"
    onkeyup="searchPDF()"
    style="width:100%;padding:10px;border-radius:20px;border:1px solid #ccc;"
  >
</div>

  
<main class="page-content">

  <h2 class="section-title">Available PDFs</h2>

  <div class="mock-grid" id="pdfGrid"></div>

</main>

<!-- 📦 LOAD PDFs -->
<script>
fetch(window.BASE + "/pdf/pdf-list.json")
  .then(res => res.json())
  .then(pdfs => {

    const grid = document.getElementById("pdfGrid");

    pdfs.forEach(pdf => {

      const card = document.createElement("div");
      card.className = "mock-card";

      card.innerHTML = `
        <h3>${pdf.title}</h3>
        <p>${pdf.description}</p>

        <span style="font-size:12px;color:gray;">
          ${pdf.category || ""}
        </span>

      <a href="${window.BASE}/pdf/viewer.html?file=${pdf.file}">
          📄 View PDF
        </a>
      `;

      grid.appendChild(card);

    });

  });
</script>

<!-- 🔍 SEARCH -->
<script>
function searchPDF() {

  const input = document
    .getElementById("searchInput")
    .value
    .toLowerCase();

  const cards = document.querySelectorAll(".mock-card");

  cards.forEach(card => {

    const title = card.querySelector("h3").textContent.toLowerCase();
    const desc = card.querySelector("p").textContent.toLowerCase();

    const text = title + " " + desc;

    if (text.includes(input)) {
      card.style.display = "";
    } else {
      card.style.display = "none";
    }

  });

}
</script>

</body>
</html>
