<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PDF Viewer | Qmantra</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../style.css">
</head>

<body>

<header class="site-header">
  <h1>📄 PDF Viewer</h1>
</header>

<nav>
  <a href="/qmantra-site/">Home</a>
  <a href="./index.html">📚 PDFs</a>
</nav>

<!-- 📄 TITLE -->
<div style="text-align:center; margin:10px;">
  <h3 id="pdfTitle"></h3>
</div>

<!-- 📄 PDF VIEW -->
<div style="width:100%; height:85vh;">
  <iframe 
    id="pdfFrame" 
    style="width:100%; height:100%; border:none;">
  </iframe>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const file = params.get("file");

if(file){

  // Set title
  document.getElementById("pdfTitle").innerText = file;

  // Correct path for GitHub Pages
  const pdfUrl = window.location.origin + "/qmantra-site/pdf/" + file;

  document.getElementById("pdfFrame").src =
    "https://docs.google.com/gview?embedded=1&url=" + pdfUrl;

} else {
  document.getElementById("pdfTitle").innerText = "No PDF selected";
}
</script>

<!-- 🚫 Disable right click -->
<script>
document.addEventListener("contextmenu", e => e.preventDefault());
</script>

</body>
</html>
