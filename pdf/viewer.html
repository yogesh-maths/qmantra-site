<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PDF Viewer | Qmantra</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../style.css">
</head>
<body>
<header class="site-header">
  <h1>📄 PDF Viewer</h1>
</header>
<nav>
 <a id="homeLink" href="#">Home</a>
  <a href="./index.html">📚 PDFs</a>
</nav>

  <script>
const isGitHub = location.hostname.includes('github.io');
const BASE = isGitHub ? '/qmantra-site' : '';

document.getElementById("homeLink").href = BASE + "/";
</script>
  
<!-- 📄 TITLE -->
<div style="text-align:center; margin:10px;">
  <h3 id="pdfTitle"></h3>
</div>
<!-- 📄 PDF VIEW -->
<div style="width:100%; height:85vh;">
  <iframe 
    id="pdfFrame" 
    style="width:100%; height:100%; border:none;">
  </iframe>
</div>
<script>
const isGitHub = location.hostname.includes('github.io');
const BASE = isGitHub ? '/qmantra-site' : '';

const params = new URLSearchParams(window.location.search);
const file = params.get("file");

if(file){
  document.getElementById("pdfTitle").innerText = file;

  const pdfUrl = BASE + "/pdf/" + file;

  document.getElementById("pdfFrame").src = pdfUrl;
} else {
  document.getElementById("pdfTitle").innerText = "No PDF selected";
}
</script>
</body>
</html>
